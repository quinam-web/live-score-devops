name: Build, Push Docker & Deploy to Render

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # --- PHẦN 1: CHUẨN BỊ ---
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # --- PHẦN 2: BUILD CODE & TEST ---
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # --- PHẦN 3: ĐÓNG GÓI DOCKER ---
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Thay tên tài khoản của bạn vào đây nếu chưa đúng
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/live-score-app:latest

      # --- PHẦN 4: GỌI RENDER (MỚI THÊM) ---
      # Bước này chỉ chạy khi các bước trên thành công
      - name: Trigger Render Deployment
        if: success()
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
